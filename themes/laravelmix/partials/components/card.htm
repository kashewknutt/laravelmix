<div class="p-6 rounded-lg bg-surface border border-border card-lift {{ class|default('') }}">
    {% if icon %}
        <div class="flex items-center justify-center w-11 h-11 mb-5 text-lg rounded-lg bg-surface-2 text-accent border border-border">
            {{ icon }}
        </div>
    {% endif %}
    <h3 class="font-display text-lg font-bold uppercase text-fg">{{ title }}</h3>
    {% if body %}
        <p class="mt-2 text-sm text-muted leading-relaxed font-body">{{ body }}</p>
    {% endif %}
    {% if slot %}
        {{ slot|raw }}
    {% endif %}
</div>
