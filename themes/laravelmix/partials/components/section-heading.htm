<div class="{{ align == 'center' ? 'text-center' : '' }} mb-12">
    {% if eyebrow %}
        <p class="eyebrow mb-3">{{ eyebrow }}</p>
    {% endif %}
    <h2 class="font-display text-3xl sm:text-4xl font-bold uppercase text-fg tracking-tight">{{ title }}</h2>
    {% if subtitle %}
        <p class="mt-4 max-w-2xl {{ align == 'center' ? 'mx-auto' : '' }} text-muted font-body leading-relaxed">{{ subtitle }}</p>
    {% endif %}
</div>
