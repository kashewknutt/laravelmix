<header
    x-data="{ open: false, scrolled: false }"
    x-init="window.addEventListener('scroll', () => { scrolled = window.scrollY > 20 })"
    :class="scrolled ? 'bg-surface/95 backdrop-blur-sm shadow-soft border-b border-surface-subtle' : 'bg-transparent'"
    class="sticky top-0 z-50 transition-all duration-300"
>
    {% set navItems = [
        { url: '/', label: 'Home' },
        { url: '/showcase', label: 'Showcase' },
        { url: '/about', label: 'About' },
        { url: '/contact', label: 'Contact' }
    ] %}
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <a href="/" class="flex items-center gap-2 text-lg font-semibold text-ink">
                <span class="flex items-center justify-center w-8 h-8 text-sm font-bold text-white rounded-lg bg-accent">A</span>
                <span>ACME</span>
            </a>

            <nav class="hidden md:flex items-center gap-1">
                {% for item in navItems %}
                    <a
                        href="{{ item.url }}"
                        class="px-4 py-2 text-sm font-medium rounded-lg transition-colors duration-200 {{ this.page.url == item.url ? 'text-accent bg-accent-light' : 'text-ink-muted hover:text-ink hover:bg-surface-subtle' }}"
                    >
                        {{ item.label }}
                    </a>
                {% endfor %}
            </nav>

            <button
                @click="open = !open"
                class="flex items-center justify-center w-10 h-10 rounded-lg md:hidden text-ink-muted hover:bg-surface-subtle"
                aria-label="Toggle menu"
            >
                <svg x-show="!open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
                <svg x-show="open" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <nav
            x-show="open"
            x-cloak
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 -translate-y-2"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-2"
            class="pb-4 md:hidden"
        >
            <div class="flex flex-col gap-1">
                {% for item in navItems %}
                    <a
                        href="{{ item.url }}"
                        @click="open = false"
                        class="px-4 py-3 text-sm font-medium rounded-lg {{ this.page.url == item.url ? 'text-accent bg-accent-light' : 'text-ink-muted hover:bg-surface-subtle' }}"
                    >
                        {{ item.label }}
                    </a>
                {% endfor %}
            </div>
        </nav>
    </div>
</header>
