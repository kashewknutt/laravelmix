name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-theme:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: themes/laravelmix

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: themes/laravelmix/package.json

      - name: Install and build theme assets
        run: |
          npm install --no-audit --no-fund
          npm run prod

  build-docker:
    runs-on: ubuntu-latest
    needs: build-theme

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t laravelmix-october:test .
