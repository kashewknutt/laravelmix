name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVICE_NAME: laravelmix-october
  IMAGE_NAME: laravelmix-october
  GCP_PROJECT_ID: valneetrivial

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deploy region
        run: |
          REGION="${{ secrets.GCP_REGION }}"
          if [ -z "$REGION" ]; then
            REGION="asia-southeast1"
          fi
          echo "GCP_REGION=${REGION}" >> "$GITHUB_ENV"
          echo "Deploying to region: ${REGION}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/laravelmix/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
        env:
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          APP_URL="${APP_URL_SECRET:-https://laravelmix.valnee.com}"
          gcloud run deploy "${SERVICE_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --image "${IMAGE}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "APP_ENV=production,APP_DEBUG=false,ACTIVE_THEME=laravelmix,LOG_CHANNEL=stderr,APP_KEY=${APP_KEY},DB_CONNECTION=sqlite,DB_DATABASE=/var/www/html/storage/database.sqlite,CACHE_STORE=file,SESSION_DRIVER=file,LINK_POLICY=secure,RELATIVE_LINKS=true,APP_URL=${APP_URL}" \
            --quiet
          echo "APP_URL=${APP_URL}" >> "$GITHUB_ENV"
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL_SECRET: ${{ secrets.APP_URL }}

      - name: Get service URLs for summary
        id: deploy
        run: |
          RUN_URL=$(gcloud run services describe "${SERVICE_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format 'value(status.url)')
          echo "run_url=${RUN_URL}" >> "$GITHUB_OUTPUT"
          echo "public_url=${APP_URL}" >> "$GITHUB_OUTPUT"
          echo "Cloud Run URL: ${RUN_URL}"
          echo "Public URL: ${APP_URL}"
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}

      - name: Deployment summary
        run: |
          echo "## Deployment successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Public URL:** ${{ steps.deploy.outputs.public_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Cloud Run URL:** ${{ steps.deploy.outputs.run_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Project | \`${{ env.GCP_PROJECT_ID }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | \`${{ env.GCP_REGION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | \`${{ env.SERVICE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Theme | \`laravelmix\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
